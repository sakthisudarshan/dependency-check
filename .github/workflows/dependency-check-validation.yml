name: Dependency-Check SCA Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Offline Java validation (no NVD download)
        run: |
          chmod +x mvnw
          ./mvnw -B test -Poffline-validation

      - name: Full scan pipeline (optional NVD)
        if: github.event_name == 'workflow_dispatch'
        run: |
          ./mvnw -B clean test
          ./mvnw -B versions:display-dependency-updates \
            -DoutputFile=target/dependency-updates.txt \
            -DprocessDependencyManagement=false
          ./mvnw -B dependency-check:check -Dformats=JSON,HTML
          ./mvnw -B exec:java@export-platform
          ./mvnw -B exec:java@validate-gate
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Verify platform JSON exists
        run: test -f dependency_check/0/dependency_check.json

      - name: Upload platform JSON to S3
        if: env.TESTABLE_METRICS_BUCKET != ''
        env:
          TESTABLE_METRICS_BUCKET: ${{ secrets.TESTABLE_METRICS_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: ./mvnw -B exec:java@upload-s3

      - name: Upload metrics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-metrics-report
          path: |
            reports/
            dependency_check/0/dependency_check.json
          retention-days: 30
